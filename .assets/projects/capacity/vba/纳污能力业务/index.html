<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>纳污能力业务</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="河道纳污能力计算 - 场景分析">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- 主题样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- 数学公式支持 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
  <style>
    /* 自定义样式 */
    :root {
      --theme-color: #3F51B5;
    }
    .sidebar {
      padding-top: 0;
    }
    .sidebar > h1 {
      margin: 0;
      padding: 1rem;
      background: var(--theme-color);
      color: white;
      font-size: 1.2rem;
    }
    /* 表格样式优化 */
    table {
      display: table;
      width: 100%;
    }
    th {
      background: #f5f5f5;
    }
    /* 负数高亮 */
    td:contains('-') {
      color: #d32f2f;
    }
    /* 代码块内的图表 */
    pre code {
      font-family: 'Courier New', monospace;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '纳污能力业务',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 3
      },
      // 数学公式配置
      latex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    }
  </script>
  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 数学公式插件 -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.min.js"></script>
  <!-- 代码复制 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
</body>
</html>
