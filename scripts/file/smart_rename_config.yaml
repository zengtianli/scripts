# Downloads 智能重命名配置

# 扫描目录（默认 --all 时扫描所有）
scan_dirs:
  - ~/Downloads/文档
  - ~/Downloads/图片
  - ~/Downloads/视频音频
  - ~/Downloads/压缩包
  - ~/Downloads/软件安装包
  - ~/Downloads/邮件
  - ~/Downloads/配置文件
  - ~/Downloads/其他

# 输出路径
plan_file: ~/Downloads/_rename_plan.md
log_file: ~/Downloads/_rename_log.json
app_log: ~/.local/log/smart_rename.log

# AI 配置
ai:
  model: claude-haiku-4-5-20251001
  max_tokens: 4096
  batch_size: 15          # 每批发送的文件数
  content_preview_chars: 500  # 内容预览最大字符数

# 命名规范
naming:
  format: "项目名-内容描述-日期"  # 说明用，不参与逻辑
  date_format: YYYYMMDD

# 相似度阈值
similarity_threshold: 0.7

# 忽略
ignore_prefixes:
  - "~$"
  - "."
